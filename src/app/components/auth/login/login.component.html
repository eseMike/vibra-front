<div class="auth-container">
  <form
    *ngIf="loginForm"
    [formGroup]="loginForm"
    (ngSubmit)="onSubmit()"
    class="auth-form"
  >
    <button
      type="button"
      class="auth-close-btn close-btn"
      routerLink="/landing"
      aria-label="Cerrar"
    >
      ✕
    </button>

    <h2 class="auth-title">Iniciar Sesión</h2>
    <p class="auth-subtitle">
      Accede a tu cuenta y continúa la experiencia Vibra
    </p>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="Ingresa tu correo"
        class="auth-input"
      />
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Ingresa tu contraseña"
        class="auth-input"
      />
    </div>

    <div class="forgot-password-wrapper">
      <a routerLink="/auth/recuperar" class="forgot-password-link">
        ¿Olvidaste tu contraseña?
      </a>
    </div>

    <div *ngIf="loginForm.touched && loginForm.invalid" class="error-msg">
      Credenciales inválidas
    </div>

    <button type="submit" class="auth-btn premium-btn" [disabled]="isLoading">
      <span *ngIf="!isLoading">Entrar</span>
      <span *ngIf="isLoading" class="spinner"></span>
    </button>

    <p class="switch-option">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="register-link">Crear cuenta</a>
    </p>
  </form>
</div>
