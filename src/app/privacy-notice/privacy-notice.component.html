<div class="privacy-notice-container">
  <h1>Aviso de Privacidad</h1>

  <p class="privacy-text">
    Este sitio contiene contenido para mayores de edad. Para continuar confirma
    que eres mayor de 18 años y aceptas nuestro aviso de privacidad.
  </p>

  <div class="privacy-actions">
    <button class="btn-accept" (click)="continuar()">
      Sí, soy mayor de 18 años y acepto
    </button>

    <button class="btn-decline" routerLink="/underage">
      Soy menor de edad
    </button>
  </div>
</div>
