<div class="register-container">
  <div class="register-box">
    <h2>Crear Cuenta</h2>
    <button
      type="button"
      class="close-btn"
      routerLink="/landing"
      aria-label="Cerrar registro"
    >
      ×
    </button>

    <form
      *ngIf="registerForm"
      [formGroup]="registerForm"
      (ngSubmit)="onSubmit()"
    >
      <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>
      <label for="publicName">Nombre público</label>
      <input
        id="publicName"
        type="text"
        formControlName="publicName"
        placeholder="Nombre que se mostrará en tu perfil"
      />
      <label for="email">Correo electrónico</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="Ingresa tu correo"
      />

      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Crea una contraseña"
      />

      <label for="confirmPassword">Confirmar contraseña</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        placeholder="Repite tu contraseña"
      />

      <!-- Selección de rol -->
      <div class="role-selector">
        <label>¿Cómo quieres usar Vibra?</label>

        <div class="role-options">
          <label class="role-card">
            <input type="radio" formControlName="role" value="user" />
            <span>Explorar contenido</span>
          </label>

          <label class="role-card">
            <input type="radio" formControlName="role" value="creator" />
            <span>Crear contenido</span>
          </label>
        </div>
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? "Creando..." : "Crear cuenta" }}
      </button>
    </form>

    <p class="login-link">
      ¿Ya tienes cuenta?
      <a routerLink="/auth/login">Iniciar sesión</a>
    </p>
  </div>
</div>
