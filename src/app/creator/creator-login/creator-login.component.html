<div class="creator-login-container">
  <h2 class="creator-login-title">Acceso para creadoras</h2>

  <form>
    <div class="form-group">
      <label>Usuario o correo</label>
      <input
        type="text"
        placeholder="Ingresa tu usuario o correo"
        [(ngModel)]="email"
        name="email"
      />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input
        type="password"
        placeholder="Ingresa tu contraseña"
        [(ngModel)]="password"
        name="password"
      />
    </div>

    <button type="button" class="btn-login" (click)="login()">Acceder</button>
  </form>

  <div class="extra-links">
    <a routerLink="/creator-register">Regístrate</a>
    <a routerLink="/auth/recover">Olvidé mi contraseña</a>
  </div>
</div>
